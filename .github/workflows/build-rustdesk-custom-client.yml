name: Build RustDesk Custom Client

on:
  workflow_dispatch:
    inputs:
      rendezvous_server:
        description: "RustDesk self-host server"
        required: false
        type: string
      rs_pub_key:
        description: "Public key from rustdesk-server"
        required: false
        type: string
      api_server:
        description: "Optional API server URL"
        required: false
        type: string
      artifact_name:
        description: "Name of uploaded artifact"
        required: false
        default: "rustdesk-custom-client-windows"
        type: string
      client_label:
        description: "Short label used in artifact file names"
        required: false
        default: "desk-itpe-pl"
        type: string

permissions:
  contents: read

jobs:
  build-windows-custom-client:
    name: Build Windows custom client
    runs-on: windows-latest
    env:
      RENDEZVOUS_SERVER: ${{ github.event.inputs.rendezvous_server || secrets.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ github.event.inputs.rs_pub_key || secrets.RS_PUB_KEY }}
      API_SERVER: ${{ github.event.inputs.api_server || secrets.API_SERVER }}
      ARTIFACT_NAME: ${{ github.event.inputs.artifact_name || 'rustdesk-custom-client-windows' }}
      CLIENT_LABEL: ${{ github.event.inputs.client_label || 'desk-itpe-pl' }}

    steps:
      - name: Validate self-host settings
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RENDEZVOUS_SERVER:-}" ]; then
            echo "RENDEZVOUS_SERVER is empty." >&2
            exit 1
          fi
          if [ -z "${RS_PUB_KEY:-}" ]; then
            echo "RS_PUB_KEY is empty." >&2
            exit 1
          fi
          printf 'Building RustDesk for %s\n' "$RENDEZVOUS_SERVER"

      - name: Checkout RustDesk fork with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare Python shims
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/shims
          cat > .github/shims/python3.cmd <<'EOF'
          @echo off
          python %*
          EOF
          cat > .github/shims/pip3.cmd <<'EOF'
          @echo off
          pip %*
          EOF
          printf '%s\n' "$PWD/.github/shims" >> "$GITHUB_PATH"

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin
            ~\.cargo\registry\cache
            ~\.cargo\registry\index
            ~\.cargo\git\db
            target
          key: ${{ runner.os }}-cargo-rustdesk-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rustdesk-

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: ${{ runner.os }}-vcpkg-rustdesk-v1

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install LLVM
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          $clangPath = Join-Path $llvmBin "clang.exe"
          if (-not (Test-Path -LiteralPath $clangPath)) {
            choco install llvm -y --no-progress
          }
          if (-not (Test-Path -LiteralPath $clangPath)) {
            throw "Nie znaleziono clang.exe po instalacji LLVM."
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Bootstrap vcpkg and install RustDesk dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd /c
          if [ ! -d vcpkg/.git ]; then
            git clone https://github.com/microsoft/vcpkg vcpkg
          fi
          cd vcpkg
          git fetch origin --force
          git checkout master
          git pull --ff-only origin master
          ./bootstrap-vcpkg.bat
          export VCPKG_ROOT=/c/vcpkg
          ./vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
          echo "VCPKG_ROOT=C:\vcpkg" >> "$GITHUB_ENV"

      - name: Download sciter.dll
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/debug target/release
          curl -L https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll -o target/debug/sciter.dll
          cp target/debug/sciter.dll target/release/sciter.dll

      - name: Resolve MSVC linker
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vsWhere)) {
            throw "Nie znaleziono vswhere.exe potrzebnego do odszukania linkera MSVC."
          }
          $msvcLinker = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "**\Hostx64\x64\link.exe" | Select-Object -First 1
          if (-not $msvcLinker) {
            throw "Nie znaleziono link.exe z Visual Studio Build Tools."
          }
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$msvcLinker" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate inline Sciter resources
        shell: bash
        run: |
          set -euo pipefail
          python res/inline-sciter.py

      - name: Build desktop client with inline resources
        shell: pwsh
        run: |
          cargo build --release --features inline

      - name: Prepare artifact payload
        shell: bash
        run: |
          set -euo pipefail
          label="$(printf '%s' "${CLIENT_LABEL:-custom}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')"
          mkdir -p dist

          exe_candidate=""
          for candidate in target/release/RustDesk.exe target/release/rustdesk.exe resources/RustDesk.exe; do
            if [ -f "$candidate" ]; then
              exe_candidate="$candidate"
              break
            fi
          done
          if [ -z "$exe_candidate" ]; then
            echo "Nie znaleziono zbudowanego RustDesk.exe po buildzie inline Sciter." >&2
            exit 1
          fi

          sciter_candidate=""
          for candidate in resources/sciter.dll target/release/sciter.dll target/debug/sciter.dll; do
            if [ -f "$candidate" ]; then
              sciter_candidate="$candidate"
              break
            fi
          done

          ui_source=""
          if [ -d resources/ui ]; then
            ui_source="resources/ui"
          elif [ -d src/ui ]; then
            ui_source="src/ui"
          fi

          cp "$exe_candidate" "dist/rustdesk-${label}.exe"
          if [ -n "$sciter_candidate" ]; then
            cp "$sciter_candidate" dist/sciter.dll
          fi
          if [ -n "$ui_source" ]; then
            mkdir -p dist/ui
            cp -R "$ui_source"/. dist/ui/
          fi

          {
            echo "BUILDER=python res/inline-sciter.py + cargo build --release --features inline"
            echo "RENDEZVOUS_SERVER=${RENDEZVOUS_SERVER}"
            echo "RS_PUB_KEY=${RS_PUB_KEY}"
            echo "API_SERVER=${API_SERVER}"
            echo "CLIENT_LABEL=${CLIENT_LABEL}"
            echo "GITHUB_SHA=${GITHUB_SHA}"
            echo "EXE_SOURCE=${exe_candidate}"
            echo "SCITER_SOURCE=${sciter_candidate}"
            echo "UI_SOURCE=${ui_source}"
          } > dist/build-info.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*
          if-no-files-found: error
